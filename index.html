<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WashGo Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=2000');
            background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh;
        }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="text-white p-6 font-sans">
    <div id="app" class="max-w-md mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-blue-400">WASHGO PRO</h1>
            <p class="opacity-80">Pakar Cuci Rumah Rawang</p>
        </div>
        
        <div id="main-menu" class="space-y-4">
            <button onclick="showDetail('Basic Cleaning', 'RM80 - RM120')" class="glass w-full p-4 rounded-2xl flex items-center gap-4 transition hover:bg-white/20">
                <img src="https://cdn-icons-png.flaticon.com/128/3063/3063186.png" class="w-12 h-12 rounded-lg" alt="icon">
                <div class="text-left"><div class="font-bold">Basic Cleaning</div><div class="text-xs opacity-70">RM80 - RM120</div></div>
            </button>
            <button onclick="showDetail('Deep Cleaning', 'RM120 - RM180')" class="glass w-full p-4 rounded-2xl flex items-center gap-4 transition hover:bg-white/20">
                <img src="https://cdn-icons-png.flaticon.com/128/2917/2917992.png" class="w-12 h-12 rounded-lg" alt="icon">
                <div class="text-left"><div class="font-bold">Deep Cleaning</div><div class="text-xs opacity-70">RM120 - RM180</div></div>
            </button>
            <button onclick="showDetail('Move In / Move Out', 'RM150 - RM250')" class="glass w-full p-4 rounded-2xl flex items-center gap-4 transition hover:bg-white/20">
                <img src="https://cdn-icons-png.flaticon.com/128/3062/3062934.png" class="w-12 h-12 rounded-lg" alt="icon">
                <div class="text-left"><div class="font-bold">Move In / Move Out</div><div class="text-xs opacity-70">RM150 - RM250</div></div>
            </button>
            <button onclick="showDetail('Post Renovation', 'RM250 - RM500')" class="glass w-full p-4 rounded-2xl flex items-center gap-4 transition hover:bg-white/20">
                <img src="https://cdn-icons-png.flaticon.com/128/2750/2750785.png" class="w-12 h-12 rounded-lg" alt="icon">
                <div class="text-left"><div class="font-bold">Post Renovation</div><div class="text-xs opacity-70">RM250 - RM500</div></div>
            </button>
        </div>

        <div id="detail-view" class="hidden glass p-6 rounded-3xl">
            <h2 id="d-title" class="text-2xl font-bold text-blue-400 mb-4"></h2>
            <div class="bg-black/30 p-4 rounded-xl mb-6 text-sm">
                <p class="font-bold text-yellow-400 mb-1">Nota Penting:</p>
                Pihak kami hanya menyediakan tenaga kerja. Sila sediakan peralatan (mop, vakum, penyapu) & bahan pencuci lantai. Harga servis lebih murah!
            </div>
            <p id="d-price" class="text-xl font-bold mb-6"></p>
            <a href="https://waze.com/ul" class="block bg-blue-600 text-center py-3 rounded-xl font-bold mb-3">📍 Navigasi Waze</a>
            <button onclick="location.reload()" class="w-full opacity-50 underline text-sm">Kembali</button>
        </div>
    </div>
    <script>
        function showDetail(t, p) {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            document.getElementById('d-title').innerText = t;
            document.getElementById('d-price').innerText = "Anggaran: " + p;
        }
    </script>
</body>
</html>
