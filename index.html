```html
<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WashGo Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#f3f4f6;
}
.hero{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="hero text-white p-6 rounded-b-3xl shadow-lg">

    <h1 class="text-3xl font-bold">
        WASHGO PRO
    </h1>

    <p class="text-sm mt-2 opacity-90">
        Servis Pembersihan Profesional
    </p>

    <div class="grid grid-cols-3 gap-3 mt-5 text-center">

        <div class="bg-white/10 p-3 rounded-xl">
            <div class="font-bold">1200+</div>
            <div class="text-xs">Customer</div>
        </div>

        <div class="bg-white/10 p-3 rounded-xl">
            <div class="font-bold">4.9★</div>
            <div class="text-xs">Rating</div>
        </div>

        <div class="bg-white/10 p-3 rounded-xl">
            <div class="font-bold">24/7</div>
            <div class="text-xs">Booking</div>
        </div>

    </div>
</div>

<!-- SERVICES -->
<div class="p-4">

<h2 class="font-bold text-xl mb-4">
Pilih Servis
</h2>

<div class="space-y-3">

<div onclick="showForm('Basic Cleaning','RM80 - RM120')"
class="bg-white rounded-2xl p-4 shadow cursor-pointer">

<div class="font-bold">
Basic Cleaning
</div>

<div class="text-gray-500">
RM80 - RM120
</div>

</div>

<div onclick="showForm('Deep Cleaning','RM120 - RM180')"
class="bg-white rounded-2xl p-4 shadow cursor-pointer">

<div class="font-bold">
Deep Cleaning
</div>

<div class="text-gray-500">
RM120 - RM180
</div>

</div>

<div onclick="showForm('Move In / Move Out','RM150 - RM250')"
class="bg-white rounded-2xl p-4 shadow cursor-pointer">

<div class="font-bold">
Move In / Move Out
</div>

<div class="text-gray-500">
RM150 - RM250
</div>

</div>

<div onclick="showForm('Post Renovation','RM250 - RM500')"
class="bg-white rounded-2xl p-4 shadow cursor-pointer">

<div class="font-bold">
Post Renovation
</div>

<div class="text-gray-500">
RM250 - RM500
</div>

</div>

</div>
</div>

<!-- BOOKING FORM -->

<div id="bookingForm"
class="hidden p-4">

<div class="bg-white rounded-3xl p-5 shadow">

<h2 id="serviceTitle"
class="text-2xl font-bold">
</h2>

<p id="servicePrice"
class="text-gray-500 mb-5">
</p>

<input id="name"
type="text"
placeholder="Nama Penuh"
class="w-full border p-3 rounded-xl mb-3">

<input id="phone"
type="tel"
placeholder="No Telefon"
class="w-full border p-3 rounded-xl mb-3">

<input id="address"
type="text"
placeholder="Alamat"
class="w-full border p-3 rounded-xl mb-3">

<input id="date"
type="date"
class="w-full border p-3 rounded-xl mb-3">

<input id="time"
type="time"
class="w-full border p-3 rounded-xl mb-3">

<textarea id="note"
placeholder="Nota Tambahan"
class="w-full border p-3 rounded-xl mb-3"></textarea>

<input id="gps"
type="text"
placeholder="Lokasi GPS"
class="w-full border p-3 rounded-xl mb-3">

<button
onclick="getLocation()"
class="w-full bg-blue-600 text-white p-3 rounded-xl mb-3">

📍 Dapatkan Lokasi

</button>

<button
onclick="submitBooking()"
class="w-full bg-green-600 text-white p-3 rounded-xl font-bold">

TEMPAH SEKARANG

</button>

</div>
</div>

<script>

function showForm(service,price){

document.getElementById("bookingForm")
.classList.remove("hidden");

document.getElementById("serviceTitle")
.innerText=service;

document.getElementById("servicePrice")
.innerText=price;

window.scrollTo(0,document.body.scrollHeight);

}

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

document.getElementById("gps").value=
pos.coords.latitude + "," +
pos.coords.longitude;

});

}

}

function submitBooking(){

let service =
document.getElementById("serviceTitle").innerText;

let name =
document.getElementById("name").value;

let phone =
document.getElementById("phone").value;

let address =
document.getElementById("address").value;

let date =
document.getElementById("date").value;

let time =
document.getElementById("time").value;

let gps =
document.getElementById("gps").value;

let note =
document.getElementById("note").value;

let msg =
`*TEMPAHAN BARU WASHGO PRO*

Servis: ${service}

Nama: ${name}

Telefon: ${phone}

Alamat: ${address}

Tarikh: ${date}

Masa: ${time}

GPS: ${gps}

Nota: ${note}`;

window.open(
"https://wa.me/60123456789?text=" +
encodeURIComponent(msg)
);

}

</script>

</body>
</html>
```
