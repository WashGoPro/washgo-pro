<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>WashGo Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=1200'); background-size: cover; background-position: center; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="text-white p-6">
    <div id="app" class="max-w-md mx-auto text-center">
        <h1 onclick="adminLogin()" class="text-4xl font-black text-blue-400 cursor-pointer mb-8">WASHGO PRO</h1>
        
        <div id="main-menu" class="space-y-4">
            <button onclick="showDetail('Basic Cleaning', 80, 120)" class="glass w-full p-4 rounded-2xl flex items-center gap-4 hover:bg-white/20 transition">
                <img src="https://cdn-icons-png.flaticon.com/128/3421/3421933.png" class="w-12 h-12">
                <div class="text-left"><div class="font-bold">Basic Cleaning</div><div class="text-xs opacity-70">RM80 - RM120</div></div>
            </button>
            <button onclick="showDetail('Deep Cleaning', 120, 180)" class="glass w-full p-4 rounded-2xl flex items-center gap-4 hover:bg-white/20 transition">
                <img src="https://cdn-icons-png.flaticon.com/128/2904/2904871.png" class="w-12 h-12">
                <div class="text-left"><div class="font-bold">Deep Cleaning</div><div class="text-xs opacity-70">RM120 - RM180</div></div>
            </button>
            <button onclick="showDetail('Move In / Move Out', 150, 250)" class="glass w-full p-4 rounded-2xl flex items-center gap-4 hover:bg-white/20 transition">
                <img src="https://cdn-icons-png.flaticon.com/128/3004/3004613.png" class="w-12 h-12">
                <div class="text-left"><div class="font-bold">Move In / Move Out</div><div class="text-xs opacity-70">RM150 - RM250</div></div>
            </button>
        </div>

        <div id="detail-view" class="hidden glass p-6 rounded-3xl text-left">
            <h2 id="d-title" class="text-2xl font-bold mb-4"></h2>
            <p id="d-price" class="text-lg mb-4 font-semibold"></p>
            <a href="https://waze.com/ul" class="block bg-blue-600 text-center py-3 rounded-xl font-bold mb-4">📍 Waze</a>
            <button onclick="location.reload()" class="w-full opacity-50 underline">Kembali</button>
        </div>
    </div>

    <script>
        function adminLogin() {
            let pass = prompt("Masukkan Password Admin:");
            if(pass === "admin123") {
                let jarak = prompt("Masukkan Jarak Customer (KM):");
                alert("LAPORAN ADMIN:\nProfit (70%): RM" + (80*0.7) + "\nCaj Jarak: RM" + (jarak > 10 ? 10 : (jarak > 5 ? 5 : 0)));
            } else { alert("Password Salah!"); }
        }
        function showDetail(t, min, max) {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            document.getElementById('d-title').innerText = t;
            document.getElementById('d-price').innerText = "Harga: RM" + min + " - RM" + max;
        }
    </script>
</body>
</html>
