<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WashGo Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-slate-950 text-white p-6 font-sans">
    <div id="app" class="max-w-md mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-blue-500 tracking-tight">WASHGO PRO</h1>
            <p class="text-sm opacity-60 uppercase tracking-widest mt-1">Pakar Cuci Rumah Rawang</p>
        </div>
        
        <div id="main-menu" class="space-y-3">
            <button onclick="showDetail('Basic Cleaning', 80, 120)" class="glass w-full p-5 rounded-2xl text-left transition-all active:scale-[0.98] hover:border-blue-500/30">
                <div class="font-bold text-lg mb-0.5">✨ Basic Cleaning</div>
            </button>
            <button onclick="showDetail('Deep Cleaning', 120, 180)" class="glass w-full p-5 rounded-2xl text-left transition-all active:scale-[0.98] hover:border-blue-500/30">
                <div class="font-bold text-lg mb-0.5">🧼 Deep Cleaning</div>
            </button>
            <button onclick="showDetail('Move In / Move Out', 150, 250)" class="glass w-full p-5 rounded-2xl text-left transition-all active:scale-[0.98] hover:border-blue-500/30">
                <div class="font-bold text-lg mb-0.5">📦 Move In / Move Out</div>
            </button>
            <button onclick="showDetail('Post Renovation', 250, 500)" class="glass w-full p-5 rounded-2xl text-left transition-all active:scale-[0.98] hover:border-blue-500/30">
                <div class="font-bold text-lg mb-0.5">🏗️ Post Renovation</div>
            </button>
        </div>

        <div id="detail-view" class="hidden glass p-7 rounded-3xl">
            <h2 id="d-title" class="text-2xl font-bold text-blue-400 mb-5"></h2>
            <div class="bg-blue-500/10 p-5 rounded-2xl mb-6 border border-blue-500/20">
                <p class="text-blue-200 font-bold text-sm mb-2 uppercase tracking-wider">💡 Polisi Penting</p>
                <p class="text-sm opacity-80 leading-relaxed">Pihak kami menyediakan tenaga profesional sahaja. Pelanggan perlu sediakan peralatan (mop, vakum, penyapu) & bahan pencuci lantai. Harga servis lebih murah kerana barang tidak bercampur sisa rumah lain.</p>
            </div>
            <div class="mb-8">
                <p class="text-xs opacity-40 uppercase tracking-widest mb-1">Anggaran Harga</p>
                <p id="d-price" class="text-2xl font-bold"></p>
            </div>
            <a href="https://waze.com/ul" class="block bg-blue-600 text-center py-4 rounded-xl font-bold text-white mb-4">📍 Navigasi Waze</a>
            <button onclick="location.reload()" class="w-full text-sm opacity-40">Kembali ke Menu</button>
        </div>
    </div>

    <script>
        // FORMULA RAHSIA (Admin Mode):
        // 1. Profit = Harga servis x 0.7
        // 2. Jarak > 5km: Tambah RM5, > 10km: Tambah RM10
        function calculateAdminFees(harga, jarakKM) {
            let profit = harga * 0.7;
            let travelCharge = 0;
            
            if (jarakKM > 10) { travelCharge = 10; }
            else if (jarakKM > 5) { travelCharge = 5; }
            
            let totalProfit = profit + travelCharge;
            return { profit, travelCharge, totalProfit };
        }

        function showDetail(title, min, max) {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            document.getElementById('d-title').innerText = title;
            document.getElementById('d-price').innerText = "RM" + min + " - RM" + max;
            
            // Contoh log untuk admin (Buka Console F12 untuk semak)
            let admin = calculateAdminFees(min, 12); // Contoh customer jarak 12km
            console.log("--- Laporan Admin (" + title + ") ---");
            console.log("Profit Kasar: RM" + admin.profit.toFixed(0));
            console.log("Caj Perjalanan: RM" + admin.travelCharge);
            console.log("Total Keuntungan: RM" + admin.totalProfit.toFixed(0));
        }
    </script>
</body>
</html>
