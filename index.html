<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WashGo Pro - Servis Pembersihan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); color: white; }
    </style>
</head>
<body class="bg-slate-900 text-white p-4">
    <div id="app" class="max-w-md mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">WASHGO PRO</h1>
            <p class="text-sm opacity-80">Pakar Cuci Rumah Rawang</p>
        </div>

        <!-- Senarai Servis -->
        <div id="service-list" class="space-y-4">
            <button onclick="selectService('Basic Cleaning', 80, 120, 'Cucian asas untuk penyelenggaraan rutin')" class="glass-card w-full p-4 rounded-xl text-left">
                <h2 class="font-bold">✨ Basic Cleaning</h2>
                <p class="text-xs opacity-70">Bermula RM80 - RM120</p>
            </button>
            <button onclick="selectService('Deep Cleaning', 120, 180, 'Pembersihan menyeluruh & kotoran degil')" class="glass-card w-full p-4 rounded-xl text-left">
                <h2 class="font-bold">🧼 Deep Cleaning</h2>
                <p class="text-xs opacity-70">Bermula RM120 - RM180</p>
            </button>
            <button onclick="selectService('Move In/Out', 150, 250, 'Cucian intensif rumah baru/keluar')" class="glass-card w-full p-4 rounded-xl text-left">
                <h2 class="font-bold">📦 Move In / Move Out</h2>
                <p class="text-xs opacity-70">Bermula RM150 - RM250</p>
            </button>
            <button onclick="selectService('Post Renovation', 250, 500, 'Cuci habuk, simen & sisa binaan')" class="glass-card w-full p-4 rounded-xl text-left">
                <h2 class="font-bold">🏗️ Post Renovation</h2>
                <p class="text-xs opacity-70">Bermula RM250 - RM500</p>
            </button>
        </div>

        <!-- Halaman Butiran Servis (Disembunyikan asal) -->
        <div id="detail-page" class="hidden">
            <div class="glass-card p-6 rounded-xl">
                <h2 id="service-title" class="text-xl font-bold mb-4"></h2>
                <div class="bg-yellow-900/30 p-4 rounded-lg mb-4 text-sm">
                    <p class="font-bold text-yellow-500 mb-2">💡 Nota Penting:</p>
                    <p>Pihak kami menyediakan tenaga kerja sahaja. Pelanggan perlu sediakan: Mop, Vakum, Penyapu & Sabun lantai.</p>
                    <p class="mt-2 text-xs opacity-80 italic">Harga kami lebih murah kerana barang tidak bercampur!</p>
                </div>
                <p id="price-range" class="mb-4 font-semibold"></p>
                <a href="https://waze.com/ul" class="block bg-blue-600 text-center py-2 rounded-lg mb-4">📍 Navigasi Waze</a>
                <button onclick="location.reload()" class="w-full text-sm opacity-50 underline">Kembali</button>
            </div>
        </div>
    </div>

    <script>
        function selectService(name, min, max, desc) {
            document.getElementById('service-list').classList.add('hidden');
            document.getElementById('detail-page').classList.remove('hidden');
            document.getElementById('service-title').innerText = name;
            document.getElementById('price-range').innerText = "Anggaran Harga: RM" + min + " - RM" + max;
            
            // Formula Profit (Contoh: 70% dari harga adalah profit kasar)
            let profitMin = (min * 0.7).toFixed(2);
            let profitMax = (max * 0.7).toFixed(2);
            console.log("Anggaran Profit Projek: RM" + profitMin + " - RM" + profitMax);
        }
    </script>
</body>
</html>
