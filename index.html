<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WashGo Pro - Professional Cleaning Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif; 
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem; 
            color: white;
        }
        .page { display: none; }
        #page-katalog { display: block; }
    </style>
</head>
<body class="pb-20 text-white">

<div id="app" class="max-w-md mx-auto p-4 pt-10">
    <!-- Header - Secret Admin Knock -->
    <div id="admin-trigger" onclick="handleAdminTrigger()" class="bg-blue-600 p-6 rounded-3xl text-center shadow-2xl mb-6 border-b-4 border-yellow-500 cursor-pointer hover:scale-[1.02] transition-transform">
        <h1 class="text-2xl font-black uppercase tracking-wider text-yellow-300">WASHGO PRO</h1>
        <p class="text-white text-sm opacity-90">Professional Cleaning Service</p>
    </div>

    <!-- Halaman Katalog -->
    <div id="page-katalog" class="page">
        <h2 class="text-lg font-bold mb-4 px-2">Select Service</h2>
        <div class="grid grid-cols-1 gap-4">
            <div onclick="showPage('tempah')" class="glass-card flex items-center p-4 cursor-pointer hover:bg-white/20 transition-all">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center font-bold text-yellow-300 text-xs">WG</div>
                <div class="ml-4">
                    <div class="font-bold">1. Basic Cleaning</div>
                    <div class="text-xs text-blue-200">Starts from RM 80</div>
                </div>
            </div>
            <div onclick="showPage('tempah')" class="glass-card flex items-center p-4 cursor-pointer hover:bg-white/20 transition-all">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center font-bold text-yellow-300 text-xs">WG</div>
                <div class="ml-4">
                    <div class="font-bold">2. Deep Cleaning</div>
                    <div class="text-xs text-blue-200">Starts from RM 120</div>
                </div>
            </div>
            <div onclick="showPage('tempah')" class="glass-card flex items-center p-4 cursor-pointer hover:bg-white/20 transition-all">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center font-bold text-yellow-300 text-xs">WG</div>
                <div class="ml-4">
                    <div class="font-bold">3. Move In / Out</div>
                    <div class="text-xs text-blue-200">Starts from RM 150</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Halaman Tempahan -->
    <div id="page-tempah" class="page">
        <div class="glass-card p-6">
            <h2 class="text-xl font-bold mb-4">Booking Details</h2>
            <input type="text" placeholder="Full Name" class="w-full p-3 mb-3 bg-white/10 rounded-xl text-white placeholder-white/50 outline-none border border-white/20">
            <button onclick="showPage('katalog')" class="w-full bg-yellow-500 text-blue-900 py-3 rounded-xl font-bold">Book Now</button>
            <button onclick="showPage('katalog')" class="w-full mt-3 text-white/50 text-sm hover:text-white underline">Back</button>
        </div>
    </div>

    <!-- Halaman Admin Dashboard -->
    <div id="page-admin" class="page">
        <h2 class="text-xl font-bold mb-4">Admin Dashboard</h2>
        <div class="grid grid-cols-3 gap-2 mb-6">
            <div class="glass-card p-3 text-center">
                <div class="text-[9px] uppercase text-blue-300">Revenue</div>
                <div class="font-bold">RM 2.4k</div>
            </div>
            <div class="glass-card p-3 text-center">
                <div class="text-[9px] uppercase text-blue-300">Bookings</div>
                <div class="font-bold">24</div>
            </div>
            <div class="glass-card p-3 text-center">
                <div class="text-[9px] uppercase text-blue-300">Crews</div>
                <div class="font-bold">8</div>
            </div>
        </div>
        <button onclick="showPage('katalog')" class="w-full mt-6 py-2 border border-white/20 rounded-lg text-white text-xs hover:bg-white/10">Back to Home</button>
    </div>
</div>

<script>
    const ADMIN_PASS = "123456";
    let clickCount = 0;
    let clickTimer = null;

    function handleAdminTrigger() {
        clickCount++;
        if (clickCount === 3) {
            checkAdminAccess();
            clickCount = 0;
        }
        clearTimeout(clickTimer);
        clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
    }

    function checkAdminAccess() {
        const input = prompt("Enter Admin Password:");
        if (input === ADMIN_PASS) {
            showPage('admin');
        } else if (input !== null) {
            alert("Wrong Password!");
        }
    }

    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-' + page).style.display = 'block';
    }
</script>
</body>
</html>
